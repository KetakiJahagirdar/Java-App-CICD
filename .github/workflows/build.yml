permissions:
  contents: read
  packages: write

name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      - name: Build
        run: ./mvnw clean package

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ghcr.io/ketakijahagirdar/payment-service:${{ github.run_number }}
            ghcr.io/ketakijahagirdar/payment-service:latest

      - name: Checkout Manifest Repository
        uses: actions/checkout@v4
        with:
          repository: KetakiJahagirdar/payment-service-manifests
          token: ${{ secrets.MANIFEST_REPO_TOKEN }}
          path: manifests

      - name: Update Deployment Image
        run: |
          sed -i "s/payment-service:[0-9]*/payment-service:${{ github.run_number }}/g" manifests/deployment.yaml
      
      - name: Commit and Push Changes
        run: |
          cd manifests

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          git commit -m "Deploy payment-service:${{ github.run_number }}" || exit 0

          git push