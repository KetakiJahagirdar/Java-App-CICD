name: Build and Test

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      - name: Build
        run: ./mvnw clean package

      - name: Docker Build
        run: docker build -t payment-service .